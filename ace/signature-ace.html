<!-- ACE Septic & Waste — CodeTwo Email Signatures 365 (dynamic) -->
<!-- Paste into the rule's Design step (HTML/source view), then upload the
     assets/ images via the editor's image tool so CodeTwo rehosts them. -->
<table cellspacing="0" cellpadding="0" style="width: 440px; border-collapse: collapse; line-height: initial">
  <tbody>
    <!-- Row 1: name / title  |  logo -->
    <tr>
      <td style="width: 230px; height: auto; padding: 0; vertical-align: top">
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 18pt; line-height: 1; color: #000000" data-codetwo-visible="Name">
          <b>{First name} {Last name}</b>
        </p>
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.25; color: #335E89" data-codetwo-visible="Job title">
          {Title}
        </p>
      </td>
      <td style="width: 210px; height: auto; padding: 0; vertical-align: top">
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 10pt; text-align: right" data-codetwo-visible="Logo">
          <a href="https://acesepticandwaste.com" target="_blank"><img src="assets/ace-logo.png" border="0" alt="ACE Septic & Waste" width="151" height="58" style="width: 151px; height: 58px"></a>
        </p>
      </td>
    </tr>
    <!-- Row 2: contact block (full width) -->
    <tr>
      <td style="width: 440px; height: auto; padding: 12px 0 0 0; vertical-align: top" colspan="2">
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 9pt; line-height: 1.5; color: #808080" data-codetwo-visible="Phone">
          {RT}<b style="color: #000000">Mobile:</b> <a href="tel:{Mobile}" style="color: #808080; text-decoration: none">{Mobile}</a> | {/RT}{RT}<b style="color: #000000">Phone:</b> <a href="tel:{Phone}" style="color: #808080; text-decoration: none">{Phone}</a>{/RT}
        </p>
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 9pt; line-height: 1.5; color: #808080" data-codetwo-visible="Email">
          {RT}<b style="color: #000000">Email:</b> <a href="mailto:{E-mail}" style="color: #808080; text-decoration: none">{E-mail}</a>{/RT}
        </p>
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 9pt; line-height: 1.5; color: #808080" data-codetwo-visible="Company address">
          <b style="color: #000000">{Company}</b>, 8005 Land O' Lakes Blvd, Land O' Lakes, FL 34638
        </p>
      </td>
    </tr>
    <!-- Row 3: website  |  social links -->
    <tr>
      <td style="width: 230px; height: auto; padding: 10px 0 0 0; vertical-align: middle">
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 9pt" data-codetwo-visible="Website">
          <a href="https://acesepticandwaste.com" target="_blank" style="color: #0BA94B; text-decoration: none"><b>ACESepticAndWaste.com</b></a>
        </p>
      </td>
      <td style="width: 210px; height: auto; padding: 10px 0 0 0; vertical-align: middle">
        <table align="right" cellspacing="0" cellpadding="0" style="border-collapse: collapse" data-codetwo-visible="Social links">
          <tbody>
            <tr>
              <td style="padding: 0; vertical-align: top">
                <a href="https://www.facebook.com/acesepticandwaste" class="socialLink" target="_blank"><img src="assets/badge-facebook.png" border="0" alt="Facebook" width="24" height="24" style="width: 24px; height: 24px; display: block"></a>
              </td>
              <td style="padding: 0 0 0 11px; vertical-align: top">
                <a href="https://g.page/r/CR6AtyBWpp0-EBM/review" class="socialLink" target="_blank"><img src="assets/badge-google.png" border="0" alt="Google reviews" width="24" height="24" style="width: 24px; height: 24px; display: block"></a>
              </td>
              <td style="padding: 0 0 0 11px; vertical-align: top">
                <a href="https://www.instagram.com/aceseptic/" class="socialLink" target="_blank"><img src="assets/badge-instagram.png" border="0" alt="Instagram" width="24" height="24" style="width: 24px; height: 24px; display: block"></a>
              </td>
              <td style="padding: 0 0 0 11px; vertical-align: top">
                <a href="https://www.linkedin.com/company/ace-septic-and-waste/" class="socialLink" target="_blank"><img src="assets/badge-linkedin.png" border="0" alt="LinkedIn" width="24" height="24" style="width: 24px; height: 24px; display: block"></a>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
    <!-- Row 4: Powered by The Purple Standard (above banner) -->
    <tr>
      <td style="width: 440px; height: auto; padding: 12px 0 0 0; vertical-align: top" colspan="2">
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 10pt">
          <img src="assets/ps-endorsement.png" border="0" alt="Powered by The Purple Standard" width="232" height="11" style="width: 232px; height: 11px; display: block">
        </p>
      </td>
    </tr>
    <!-- Row 5: promo banner -->
    <tr data-codetwo-visible="Banner">
      <td style="width: 440px; height: auto; padding: 12px 0 0 0; vertical-align: top" colspan="2">
        <p style="margin: 0.1pt; font-family: Arial, sans-serif; font-size: 10pt">
          <a href="https://acesepticandwaste.com" target="_blank"><img src="assets/banner-save50.png" border="0" alt="Save $50 on your next service. Find out how!" width="440" height="85" style="width: 440px; height: 85px; display: block"></a>
        </p>
      </td>
    </tr>
  </tbody>
</table>
<p style="margin: 0.1pt; font-family: Arial; font-size: 10pt"><br></p>
