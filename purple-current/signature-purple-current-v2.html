<!-- Purple Current email signature — v2 (new template). CodeTwo-ready snippet; keeps dynamic {fields}. -->
<table cellspacing="0" cellpadding="0" id="purple-current-signature-v2" style="width: 560px; border-collapse: collapse; line-height: initial">
  <tbody>
    <!-- Name -->
    <tr>
      <td colspan="3" style="padding: 0 0 2px 0; vertical-align: top">
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 18pt; color: #411144" data-codetwo-visible="Name"><b>{First name} {Last name}</b></p>
      </td>
    </tr>
    <!-- Title -->
    <tr>
      <td colspan="3" style="padding: 0 0 14px 0; vertical-align: top">
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 10.5pt; color: #411144" data-codetwo-visible="Job title">{Title}</p>
      </td>
    </tr>

    <!-- Logo | gap | Contact block (Phone / Address / Email) -->
    <tr>
      <td style="width: 200px; padding: 0; vertical-align: top">
        <p style="margin: 0" data-codetwo-visible="Logo">
          <a href="https://purple-current.com/" target="_blank"><img src="assets/logo-v2.png" border="0" alt="Purple Current logo" width="200" height="87" style="width: 200px; height: 87px; display: block"></a>
        </p>
      </td>
      <td style="width: 30px; padding: 0; vertical-align: top">&nbsp;</td>
      <td style="width: 330px; padding: 2px 0 0 0; vertical-align: top">
        <table cellspacing="0" cellpadding="0" style="border-collapse: collapse; line-height: initial">
          <tbody>
            <tr data-codetwo-visible="Phone">
              <td style="padding: 0 6px 6px 0; vertical-align: top; font-family: Arial, sans-serif; font-size: 10.5pt; color: #411144"><b>P:</b></td>
              <td style="padding: 0 0 6px 0; vertical-align: top; font-family: Arial, sans-serif; font-size: 10.5pt; color: #333333"><a href="tel:+18133550865" style="color: #333333; text-decoration: none">(813) 355-0865</a></td>
            </tr>
            <tr data-codetwo-visible="Company address">
              <td style="padding: 0 6px 6px 0; vertical-align: top; font-family: Arial, sans-serif; font-size: 10.5pt; color: #411144"><b>A:</b></td>
              <td style="padding: 0 0 6px 0; vertical-align: top; font-family: Arial, sans-serif; font-size: 10.5pt; color: #333333">8011 Land O' Lakes Blvd,<br>Land O' Lakes, FL 34638</td>
            </tr>
            <tr data-codetwo-visible="Email">
              <td style="padding: 0 6px 0 0; vertical-align: top; font-family: Arial, sans-serif; font-size: 10.5pt; color: #411144"><b>E:</b></td>
              <td style="padding: 0; vertical-align: top; font-family: Arial, sans-serif; font-size: 10.5pt; color: #333333">{RT}<a href="mailto:{E-mail}" style="color: #333333; text-decoration: none">{E-mail}</a>{/RT}</td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>

    <!-- Divider rule -->
    <tr>
      <td colspan="3" style="padding: 16px 0 0 0; border-top: 1px solid #411144; font-size: 0; line-height: 0">&nbsp;</td>
    </tr>

    <!-- Endorsement (left) + social icons (right-aligned), same row -->
    <tr>
      <td colspan="3" style="padding: 0 0 16px 0; vertical-align: middle">
        <table width="100%" cellspacing="0" cellpadding="0" style="border-collapse: collapse; line-height: initial">
          <tbody>
            <tr>
              <td style="padding: 0; vertical-align: middle; text-align: left">
                <p style="margin: 0" data-codetwo-visible="Endorsement">
                  <a href="https://www.purple-standard.com/" target="_blank"><img src="assets/endorsement.png" border="0" alt="Powered by The Purple Standard" width="360" height="17" style="width: 360px; height: 17px; display: block"></a>
                </p>
              </td>
              <td style="padding: 0; vertical-align: middle; text-align: right; font-size: 0; line-height: 0" data-codetwo-visible="Social links">
                <a href="https://share.google/SFB2Gbv8p9uJoWxwg" target="_blank"><img src="assets/badge-google.png" border="0" alt="Google" width="18" height="18" style="width: 18px; height: 18px; display: inline-block; margin-left: 9px"></a><a href="https://www.facebook.com/people/Purple-Current/61573255989927/" target="_blank"><img src="assets/badge-facebook.png" border="0" alt="Facebook" width="18" height="18" style="width: 18px; height: 18px; display: inline-block; margin-left: 9px"></a><a href="https://www.instagram.com/purplecurrent" target="_blank"><img src="assets/badge-instagram.png" border="0" alt="Instagram" width="18" height="18" style="width: 18px; height: 18px; display: inline-block; margin-left: 9px"></a><a href="https://www.linkedin.com/company/purple-current/" target="_blank"><img src="assets/badge-linkedin.png" border="0" alt="LinkedIn" width="18" height="18" style="width: 18px; height: 18px; display: inline-block; margin-left: 9px"></a><a href="https://www.youtube.com/@Purple-Current" target="_blank"><img src="assets/badge-youtube.png" border="0" alt="YouTube" width="18" height="18" style="width: 18px; height: 18px; display: inline-block; margin-left: 9px"></a><a href="https://www.yelp.com/biz/6WdDdQEcSfEJGduyyheRMw" target="_blank"><img src="assets/badge-yelp.png" border="0" alt="Yelp" width="18" height="18" style="width: 18px; height: 18px; display: inline-block; margin-left: 9px"></a>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>

    <!-- Banner -->
    <tr>
      <td colspan="3" style="padding: 0; vertical-align: top">
        <p style="margin: 0" data-codetwo-visible="Banner">
          <a href="https://purple-current.com/" target="_blank"><img src="assets/banner-v2.jpg" border="0" alt="Purple up. Power on. Speak with an expert." width="560" height="169" style="width: 560px; height: 169px; display: block"></a>
        </p>
      </td>
    </tr>
  </tbody>
</table>
<p style="margin: 0.1pt; font-family: Arial; font-size: 10pt"><br></p>
