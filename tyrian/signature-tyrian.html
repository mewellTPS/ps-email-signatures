<!-- Tyrian Roofing — email signature. CodeTwo-ready (dynamic fields).
     Layout: logo + endorsement (left) | gold divider | contact + social (right).
     Colors: Tyrian purple #531757, gold #E59519 (divider), grey #666666 (contact).
     Assets self-hosted in assets/ (upload to CodeTwo during loading).
     Social hrefs are BEST-GUESS handles — confirm real Tyrian accounts before loading (see README). -->
<table cellspacing="0" cellpadding="0" id="tyrian-signature" style="border-collapse: collapse; line-height: initial">
  <tbody>
    <tr>
      <!-- LEFT: logo + endorsement -->
      <td style="padding: 0 28px 0 0; vertical-align: middle; text-align: left">
        <a href="https://tyrianroofing.com/" target="_blank"><img src="assets/logo.png" border="0" alt="Tyrian Roofing" width="260" height="80" style="width: 260px; height: 80px; display: block"></a>
        <img src="assets/endorsement.png" border="0" alt="Powered by The Purple Standard" width="232" height="11" style="width: 232px; height: 11px; display: block; margin-top: 14px">
      </td>

      <!-- RIGHT: name / title / contact / social  (gold vertical divider) -->
      <td style="padding: 0 0 0 28px; vertical-align: middle; border-left: 2px solid #E59519">
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 16pt; line-height: 1.1; color: #531757" data-codetwo-visible="Name"><b>{First name} {Last name}</b></p>
        <p style="margin: 3pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.2; color: #666666" data-codetwo-visible="Job title">{Title}</p>

        <!-- Phone / Mobile. {RT}..{/RT} drops the M: segment when Mobile is empty. -->
        <p style="margin: 12pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666">
          <b style="color: #531757">P:</b>&nbsp;<a href="tel:{Phone}" style="color: #666666; text-decoration: none">{Phone}</a>{RT}&nbsp;&nbsp;&nbsp;&nbsp;<b style="color: #531757">M:</b>&nbsp;<a href="tel:{Mobile}" style="color: #666666; text-decoration: none">{Mobile}</a>{/RT}
        </p>

        <!-- Email / Website. {RT}..{/RT} drops the E: segment when Email is empty; website always shows. -->
        <p style="margin: 4pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666">
          {RT}<b style="color: #531757">E:</b>&nbsp;<a href="mailto:{E-mail}" style="color: #531757; text-decoration: none">{E-mail}</a>&nbsp;&nbsp;&nbsp;&nbsp;{/RT}<a href="https://tyrianroofing.com/" target="_blank" style="color: #531757; text-decoration: none">www.tyrianroofing.com</a>
        </p>

        <!-- Address — static placeholder; Michael to supply the real Tyrian office address (see README). -->
        <p style="margin: 4pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Company address">Street, City&nbsp;&nbsp;&nbsp;&nbsp;Zip Code, Country</p>

        <!-- SOCIAL: bundled Font Awesome v6.5.2 brand glyphs, white on Tyrian-purple disc (self-hosted). -->
        <table cellspacing="0" cellpadding="0" style="border-collapse: collapse; line-height: initial; margin-top: 12px" data-codetwo-visible="Social links">
          <tbody>
            <tr>
              <td style="padding: 0 10px 0 0; vertical-align: middle">
                <a href="https://www.facebook.com/tyrianroofing" class="socialLink" target="_blank"><img src="assets/social-facebook.png" border="0" alt="Facebook" width="28" height="28" style="width: 28px; height: 28px; display: block"></a>
              </td>
              <td style="padding: 0 10px 0 0; vertical-align: middle">
                <a href="https://www.instagram.com/tyrianroofing" class="socialLink" target="_blank"><img src="assets/social-instagram.png" border="0" alt="Instagram" width="28" height="28" style="width: 28px; height: 28px; display: block"></a>
              </td>
              <td style="padding: 0; vertical-align: middle">
                <a href="https://www.youtube.com/@tyrianroofing" class="socialLink" target="_blank"><img src="assets/social-youtube.png" border="0" alt="YouTube" width="28" height="28" style="width: 28px; height: 28px; display: block"></a>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
<p style="margin: 0.1pt; font-family: Arial; font-size: 10pt"><br></p>
