<!-- Brisa Climate email signature — CodeTwo-ready snippet. Keeps dynamic {fields}; {RT}...{/RT} auto-hides empty lines. -->
<!-- Mock-first: office phone/mobile/email pull from the directory; company address + social URLs are TODO placeholders (see README). -->
<table cellspacing="0" cellpadding="0" id="brisa-signature" style="width: 700px; border-collapse: collapse; line-height: initial">
  <tbody>
    <!-- Top: logo+endorsement (left half) | divider | contact (right half) -->
    <tr>
      <!-- Left half: logo (top) + Powered-by endorsement (below), same width -->
      <td style="width: 340px; padding: 0; vertical-align: top">
        <p style="margin: 0 0 24px 0" data-codetwo-visible="Logo">
          <a href="https://brisaclimate.com/" target="_blank"><img src="assets/logo.png" border="0" alt="Brisa Climate" width="300" height="120" style="width: 300px; height: 120px; display: block"></a>
        </p>
        <p style="margin: 0" data-codetwo-visible="Endorsement">
          <a href="https://www.purple-standard.com/" target="_blank"><img src="assets/endorsement.png" border="0" alt="Powered by The Purple Standard" width="300" height="15" style="width: 300px; height: 15px; display: block"></a>
        </p>
      </td>

      <!-- Right half: contact (vertical purple divider = left border of this cell) -->
      <td style="padding: 0 0 0 30px; vertical-align: top; border-left: 2px solid #48104F">
        <!-- Name -->
        <p style="margin: 0 0 1px 0; font-family: Arial, sans-serif; font-size: 14pt; color: #48104F; line-height: 1.1" data-codetwo-visible="Name"><b>{First name} {Last name}</b></p>
        <!-- Title -->
        <p style="margin: 0 0 16px 0; font-family: Arial, sans-serif; font-size: 10.5pt; color: #7a7a7a" data-codetwo-visible="Job title">{Title}</p>

        <!-- Aligned 2-column contact grid: P|M, E|www, City|Zip -->
        <table cellspacing="0" cellpadding="0" style="border-collapse: collapse; line-height: initial">
          <tbody>
            <tr>
              <td style="width: 175px; padding: 0 22px 8px 0; font-family: Arial, sans-serif; font-size: 10.5pt; color: #2a2a2a; white-space: nowrap" data-codetwo-visible="Phone">{RT}<b style="color: #48104F">P:</b> <a href="tel:{Phone}" style="color: #2a2a2a; text-decoration: none">{Phone}</a>{/RT}</td>
              <td style="padding: 0 0 8px 0; font-family: Arial, sans-serif; font-size: 10.5pt; color: #2a2a2a; white-space: nowrap" data-codetwo-visible="Mobile">{RT}<b style="color: #48104F">M:</b> <a href="tel:{Mobile}" style="color: #2a2a2a; text-decoration: none">{Mobile}</a>{/RT}</td>
            </tr>
            <tr>
              <td style="padding: 0 22px 8px 0; font-family: Arial, sans-serif; font-size: 10.5pt; color: #2a2a2a; white-space: nowrap" data-codetwo-visible="Email">{RT}<b style="color: #48104F">E:</b> <a href="mailto:{E-mail}" style="color: #2a2a2a; text-decoration: none">{E-mail}</a>{/RT}</td>
              <td style="padding: 0 0 8px 0; font-family: Arial, sans-serif; font-size: 10.5pt; white-space: nowrap"><a href="https://brisaclimate.com/" target="_blank" style="color: #48104F; text-decoration: none"><b>www.brisaclimate.com</b></a></td>
            </tr>
            <!-- TODO: replace Street/City/Zip/Country with Brisa's real company address -->
            <tr>
              <td style="padding: 0 22px 14px 0; font-family: Arial, sans-serif; font-size: 10.5pt; color: #2a2a2a; white-space: nowrap">Street, City</td>
              <td style="padding: 0 0 14px 0; font-family: Arial, sans-serif; font-size: 10.5pt; color: #2a2a2a; white-space: nowrap">Zip Code, Country</td>
            </tr>
            <!-- Social icons (grouped close together). TODO: swap each href for Brisa's real profile URL. -->
            <tr>
              <td colspan="2" style="padding: 0; font-size: 0; line-height: 0">
                <a href="https://www.facebook.com/" target="_blank" style="text-decoration: none"><img src="assets/social-facebook.png" border="0" alt="Facebook" width="25" height="25" style="width: 25px; height: 25px; display: inline-block; margin-right: 7px"></a><a href="https://www.instagram.com/" target="_blank" style="text-decoration: none"><img src="assets/social-instagram.png" border="0" alt="Instagram" width="25" height="25" style="width: 25px; height: 25px; display: inline-block; margin-right: 7px"></a><a href="https://www.youtube.com/" target="_blank" style="text-decoration: none"><img src="assets/social-youtube.png" border="0" alt="YouTube" width="25" height="25" style="width: 25px; height: 25px; display: inline-block"></a>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>

    <!-- Spacer above banner -->
    <tr><td colspan="2" style="height: 20px; font-size: 0; line-height: 0">&nbsp;</td></tr>

    <!-- Full-width promo banner. TODO: point href at the real "leave a review" landing page. -->
    <tr>
      <td colspan="2" style="padding: 0; vertical-align: top">
        <p style="margin: 0" data-codetwo-visible="Banner">
          <a href="https://brisaclimate.com/" target="_blank"><img src="assets/banner-web.png" border="0" alt="The reason you keep your cool — help spread the word, leave us a review." width="700" height="171" style="width: 700px; height: 171px; display: block"></a>
        </p>
      </td>
    </tr>
  </tbody>
</table>
