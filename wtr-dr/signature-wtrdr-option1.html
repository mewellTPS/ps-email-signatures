<!-- WTR DR — Option 1 (ALTERNATE): compact stack (logo | single tight column). CodeTwo-ready.
     Kept on hand as a fallback; the live signature is signature-wtrdr.html (Option 2). -->
<table cellspacing="0" cellpadding="0" id="wtrdr-signature" style="border-collapse: collapse; line-height: initial">
  <tbody>
    <tr>
      <!-- LOGO -->
      <td style="padding: 0 22px 0 0; vertical-align: middle" data-codetwo-visible="Logo">
        <a href="https://wtrdr.com/" target="_blank"><img src="assets/logo.png" border="0" alt="WTR DR logo" width="104" height="104" style="width: 104px; height: 104px"></a>
      </td>

      <!-- NAME / TITLE / CONTACT / SOCIAL -->
      <td style="padding: 1px 0 1px 22px; vertical-align: top; border-left: 2px solid #1C2458">
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 16pt; line-height: 1; color: #1C2458" data-codetwo-visible="Name"><b>{First name} {Last name}</b></p>
        <p style="margin: 3pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.2; color: #666666" data-codetwo-visible="Job title">{Title}</p>

        <p style="margin: 11pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Phone">
          <b style="color: #1C2458">P:</b> <a href="tel:+18134298737" style="color: #666666; text-decoration: none">813-429-8737</a>
        </p>
        <!-- RT tags wrap the whole element so an empty email removes the entire line (no blank gap). -->
        {RT}<p style="margin: 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Email"><b style="color: #1C2458">E:</b> <a href="mailto:{Email}" style="color: #2E6DA6; text-decoration: none">{Email}</a></p>
        {/RT}
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Website">
          <b style="color: #1C2458">W:</b> <a href="https://wtrdr.com/" target="_blank" style="color: #2E6DA6; text-decoration: none"><b>wtrdr.com</b></a>
        </p>
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Company address">8011 Land O' Lakes Blvd, Land O' Lakes, FL 34638</p>

        <!-- SOCIAL ICONS: insert via CodeTwo editor (Insert > Social media icons) so CodeTwo hosts them. -->
        <table cellspacing="0" cellpadding="0" style="border-collapse: collapse; line-height: initial; margin-top: 11px" data-codetwo-visible="Social links">
          <tbody>
            <tr>
              <td style="padding: 0 14px 0 0; vertical-align: middle">
                <a href="https://g.page/r/CXbaZrIdtlq-EBM/review" class="socialLink" target="_blank"><img src="img_google_PLACEHOLDER.png" border="0" alt="Google icon" width="18" height="18" style="width: 18px; height: 18px"></a>
              </td>
              <td style="padding: 0 14px 0 0; vertical-align: middle">
                <a href="https://www.facebook.com/profile.php?id=61574883176668" class="socialLink" target="_blank"><img src="img_fb_77279020-a2dd-4b52-b6db-102d653378a9.png" border="0" alt="Facebook icon" width="18" height="18" style="width: 18px; height: 18px"></a>
              </td>
              <td style="padding: 0; vertical-align: middle">
                <a href="https://www.instagram.com/wtrdr_" class="socialLink" target="_blank"><img src="img_ig_aafc962e-6de8-484f-bfa4-47a024babdf3.png" border="0" alt="Instagram icon" width="18" height="18" style="width: 18px; height: 18px"></a>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
