<!-- WTR DR — Option 2: tightened three-zone (logo | name/contact | address/social). CodeTwo-ready. -->
<table cellspacing="0" cellpadding="0" id="wtrdr-signature" style="border-collapse: collapse; line-height: initial">
  <tbody>
    <tr>
      <!-- LOGO -->
      <td style="padding: 0 24px 0 0; vertical-align: middle; text-align: center" data-codetwo-visible="Logo">
        <a href="https://wtrdr.com/" target="_blank"><img src="assets/logo.png" border="0" alt="WTR DR logo" width="100" height="100" style="width: 100px; height: 100px"></a>
      </td>

      <!-- NAME / TITLE / PHONE / EMAIL -->
      <td style="padding: 0 24px; vertical-align: middle; border-left: 2px solid #1C2458">
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 16pt; line-height: 1; color: #1C2458" data-codetwo-visible="Name"><b>{First name} {Last name}</b></p>
        <p style="margin: 3pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.2; color: #666666" data-codetwo-visible="Job title">{Title}</p>
        <p style="margin: 10pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Phone">
          <b style="color: #1C2458">Phone:</b> <a href="tel:+18134298737" style="color: #666666; text-decoration: none">813-429-8737</a>
        </p>
        <!-- RT tags wrap the whole element so an empty email removes the entire line (no blank gap). -->
        {RT}<p style="margin: 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Email"><b style="color: #1C2458">Email:</b> <a href="mailto:{Email}" style="color: #2E6DA6; text-decoration: none">{Email}</a></p>
        {/RT}
      </td>

      <!-- ADDRESS / WEBSITE / SOCIAL -->
      <td style="padding: 0 0 0 24px; vertical-align: middle; border-left: 2px solid #1C2458">
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Company address">8011 Land O' Lakes Blvd</p>
        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5; color: #666666" data-codetwo-visible="Company address">Land O' Lakes, FL 34638</p>
        <p style="margin: 6pt 0 0 0; font-family: Arial, sans-serif; font-size: 10pt; line-height: 1.5" data-codetwo-visible="Website">
          <a href="https://wtrdr.com/" target="_blank" style="color: #1C2458; text-decoration: none"><b>wtrdr.com</b></a>
        </p>
        <!-- SOCIAL ICONS: insert via CodeTwo editor (Insert > Social media icons) so CodeTwo hosts them.
             img refs are CodeTwo's built-in icon assets; re-insert in the editor if broken.
             GMB/Google may not exist in CodeTwo's gallery - see README. Hrefs are correct. -->
        <table cellspacing="0" cellpadding="0" style="border-collapse: collapse; line-height: initial; margin-top: 10px" data-codetwo-visible="Social links">
          <tbody>
            <tr>
              <td style="padding: 0 13px 0 0; vertical-align: middle">
                <a href="https://g.page/r/CXbaZrIdtlq-EBM/review" class="socialLink" target="_blank"><img src="img_google_PLACEHOLDER.png" border="0" alt="Google icon" width="18" height="18" style="width: 18px; height: 18px"></a>
              </td>
              <td style="padding: 0 13px 0 0; vertical-align: middle">
                <a href="https://www.facebook.com/profile.php?id=61574883176668" class="socialLink" target="_blank"><img src="img_fb_77279020-a2dd-4b52-b6db-102d653378a9.png" border="0" alt="Facebook icon" width="18" height="18" style="width: 18px; height: 18px"></a>
              </td>
              <td style="padding: 0; vertical-align: middle">
                <a href="https://www.instagram.com/wtrdr_" class="socialLink" target="_blank"><img src="img_ig_aafc962e-6de8-484f-bfa4-47a024babdf3.png" border="0" alt="Instagram icon" width="18" height="18" style="width: 18px; height: 18px"></a>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
